server:
  port: 8882                                        # 网关服务监听端口

spring:
  application:
    name: auth-service # 应用名称

  datasource:
    url: jdbc:postgresql://localhost:5432/yachiyo?currentSchema=public&characterEncoding=utf8
    username: ${postgresql.username}
    password: ${postgresql.password}
    driver-class-name: org.postgresql.Driver

  # 邮箱配置
  mail:
    host: smtp.qq.com
    port: 465
    username: ${email.username}
    password: ${email.password}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456 # 没有就删掉
    database: 0
    # 连接池
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 100ms

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848   # Nacos 注册中心地址
        namespace: public                # 命名空间ID（非名称），用于环境隔离
        username: nacos             # 必须正确！默认是 nacos
        password: KaguyaIrohaForever           # 必须正确！默认是 nacos
        group: DEFAULT_GROUP
      config:
        server-addr: 127.0.0.1:8848   # Nacos 配置中心地址
        namespace: public
        username: nacos
        password: KaguyaIrohaForever
        group: DEFAULT_GROUP
        file-extension: yaml          # 配置文件格式
        refresh-enabled: true         # 启用动态刷新
    loadbalancer:
      nacos:
        enabled: true
      cache:
        ttl: 10s
        enabled: true

  config:
    import: nacos:${spring.application.name}

  profiles:
    include: secret

jwt:
  secret: "12345678901234567890123456789012"
  expiration: 3600000
  token-header: "Authorization"
  token-prefix: "Bearer "