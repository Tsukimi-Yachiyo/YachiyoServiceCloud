services:
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    command: redis-server --appendonly yes

  napcat:
    image: docker.1ms.run/mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    network_mode: host
    privileged: true

  nacos:
    image: nacos/nacos-server:latest
    container_name: nacos-standalone-derby
    restart: always
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - NACOS_AUTH_TOKEN=2a3fdfd6264f6116b5e71b498cb68f35
      - NACOS_AUTH_IDENTITY_KEY=nacos
      - NACOS_AUTH_IDENTITY_VALUE=KaguyaIrohaForever

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=yachiyohahaha
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"

  auth-service:
    image: 211.101.234.16:5000/auth-service:latest
    container_name: auth-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis

  file-service:
    image: 211.101.234.16:5000/file-service:latest
    container_name: file-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis

  posting-service:
    image: 211.101.234.16:5000/posting-service:latest
    container_name: posting-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis

  column-service:
    image: 211.101.234.16:5000/column-service:latest
    container_name: column-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis

  admin-service:
    image: 211.101.234.16:5000/admin-service:latest
    container_name: admin-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis

  coin-service:
    image: 211.101.234.16:5000/coin-service:latest
    container_name: coin-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis

  user-service:
    image: 211.101.234.16:5000/user-service:latest
    container_name: user-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis

  gateway-service:
    image: 211.101.234.16:5000/gateway-service:latest
    container_name: gateway-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis

  tool-service:
    image: 211.101.234.16:5000/tool-service:latest
    container_name: tool-service
    restart: always
    network_mode: host
    depends_on:
      - nacos
      - redis