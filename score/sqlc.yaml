# sqlc 配置版本，v2 是目前的主流稳定版本，兼容所有新版 sqlc
version: "2"
sql:
  - engine: "postgresql"  # 指定数据库类型为 PostgreSQL（可选：mysql/sqlite）
    queries: "./db/query"  # 存放自定义 SQL 查询的文件路径
    schema: "./db/migration"  # 存放数据库表结构（建表语句）的文件路径
    gen:
      go:  # 指定生成 Go 语言代码（可选：typescript/java 等）
        package: "db"  # 生成的 Go 代码的包名（导入时会用到）
        out: "sqlc"      # 生成的代码输出目录（执行 sqlc generate 后会自动创建）
        sql_package: "database/sql" # 指定 Go 数据库驱动为 pgx/v5（PostgreSQL 推荐驱动）