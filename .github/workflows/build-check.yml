name: Build Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-root:
    name: Build Root Project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install root project
        run: mvn clean install -DskipTests -pl .

  build-microservice:
    name: Build ${{ matrix.service }}
    needs: build-root
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - GatewayService
          - PostingService
          - AuthService
          - CoinService
          - UserService
          - FileService
          - ToolService
          - AdminService
          - ColumnService
          - QQBotService
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: mvn clean compile -DskipTests

  build-go:
    name: Build Go Projects
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.25' ]
        service:
          - RecordService
          - score
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: go build -v ./...
