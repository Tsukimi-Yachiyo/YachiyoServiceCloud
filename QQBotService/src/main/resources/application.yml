server:
  port: 8899

bot:
  yachiyo:
    self-id: 1643066019 # 机器人QQ号

shiro:
  ws:
    server: # 反向连接
      enable: true
      url: "/ws/shiro" # 默认值，用于 WebSocket 连接

spring:
  application:
    name: qqbot-service

  datasource:
    url: jdbc:postgresql://localhost:5432/yachiyo?currentSchema=public&characterEncoding=utf8
    username: ${postgresql.username}
    password: ${postgresql.password}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

  cache:
    type: redis

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848   # Nacos 注册中心地址
        namespace: public                # 命名空间ID（非名称），用于环境隔离
        username: nacos             # 必须正确！默认是 nacos
        password: KaguyaIrohaForever           # 必须正确！默认是 nacos
        group: DEFAULT_GROUP
      config:
        server-addr: 127.0.0.1:8848   # Nacos 配置中心地址
        namespace: public
        username: nacos             # 必须正确！默认是 nacos
        password: KaguyaIrohaForever           # 必须正确！默认是 nacos
        group: DEFAULT_GROUP
        file-extension: yaml          # 配置文件格式
        refresh-enabled: true         # 启用动态刷新

  config:
    import: nacos:${spring.application.name}

  profiles:
    include: secret