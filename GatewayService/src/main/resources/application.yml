server:
  port: 8881

spring:
  application:
    name: gateway-service # 应用名称

  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456 # 没有就删掉
    database: 0
    # 连接池
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 100ms

  cloud:
    loadbalancer:
      nacos:
        enabled: true
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848 # Nacos 服务地址
        username: nacos             # 必须正确！默认是 nacos
        password: KaguyaIrohaForever           # 必须正确！默认是 nacos
        namespace: public
        group: DEFAULT_GROUP # Nacos 分组
        heart-beat-interval: 500
        heart-beat-timeout: 15000
      config:
        server-addr: 127.0.0.1:8848   # Nacos 配置中心地址
        username: nacos             # 必须正确！默认是 nacos
        password: KaguyaIrohaForever           # 必须正确！默认是 nacos
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml          # 配置文件格式
        refresh-enabled: true         # 启用动态刷新
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          default-filters:
            - AddRequestHeader=X-Request-From, gateway
            - name: Retry
              args:
                retries: 2
                statuses: SERVICE_UNAVAILABLE

  config:
    import:
      - nacos:${spring.application.name}
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
    com.yachiyo.Gateway.filter: DEBUG

sentinel:
  spring:
    cloud:
      gateway:
        enabled: true    # 是否开启 Sentinel 网关

management:
  endpoints:
    web:
      exposure:
        include: health,gateway            # 暴露 gateway 端点可查看路由信息
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true # 是否开启 gateway 端点

jwt:
  secret: "12345678901234567890123456789012"
  expiration: 3600000
  token-header: "Authorization"
  token-prefix: "Bearer "


security:
  open-api:
    - /api/v1/auth/login
    - /api/v1/auth/register
    - /api/v1/auth/send-code
    - /file/**
    - /api/yachiyo/168/mini/admin/login
    - /api/v1/auth/refresh-token
    - /api/v1/auth/login-by-email
    - /api/v1/auth/change-password
    - /actuator/health/**
    - /ap1/v3/**

