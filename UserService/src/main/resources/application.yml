server:
  port: 8884

spring:
  application:
    name: user-service # 应用名称

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/yachiyo?currentSchema=public
    username: ${postgresql.username}
    password: ${postgresql.password}

  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    # 连接池
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 100ms

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848   # Nacos 注册中心地址
        namespace: public                # 命名空间ID（非名称），用于环境隔离
        username: nacos             # 必须正确！默认是 nacos
        password: KaguyaIrohaForever           # 必须正确！默认是 nacos
        group: DEFAULT_GROUP
      config:
        server-addr: 127.0.0.1:8848   # Nacos 配置中心地址
        namespace: public
        username: nacos             # 必须正确！默认是 nacos
        password: KaguyaIrohaForever           # 必须正确！默认是 nacos
        group: DEFAULT_GROUP
        file-extension: yaml          # 配置文件格式
        refresh-enabled: true         # 启用动态刷新
  config:
    import: nacos:${spring.application.name}

  profiles:
    include: secret
  # 邮箱配置
  mail:
    host: smtp.qq.com
    port: 465
    username: ${email.username}
    password: ${email.password}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  threads:
    virtual:
          enabled: true
jwt:
  secret: "12345678901234567890123456789012"
  expiration: 3600000
  token-header: "Authorization"
  token-prefix: "Bearer "

custom:
  config:
    # 推荐任务间隔
    recommendation:
      interval: "0 0/10 * * * ?" # 每10分钟执行一次
      enable: true # 是否启用推荐任务
      message: "初始配置"

    # 日期调度器间隔
    holiday:
      interval: "0 0 0/24 * * ?" # 每天0点执行一次
      enable: true # 是否启用日期调度器
      message: "初始配置"
      holiday:
        url: https://timor.tech/api/holiday/info/{date}


    approved:
      interval: "0 0 0/1 * * ?" # 每1小时执行一次
      enable: true # 是否启用审批任务
      message: "初始配置"
